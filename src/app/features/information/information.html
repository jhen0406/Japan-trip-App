<div class="min-h-full flex flex-col pt-4 px-4 sm:px-6">
  
  <!-- Header Title -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">旅遊百寶箱</h1>
    <p class="text-sm text-slate-500 mt-0.5">實用資訊與注意事項 🎒</p>
  </div>

  <div class="flex-1 overflow-y-auto hide-scrollbar pb-6">
    <div class="space-y-3">
      
      @for (section of sections(); track section.title; let idx = $index) {
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden ring-1 ring-slate-900/5 transition-all duration-300">
          
          <!-- Accordion Header -->
          <button (click)="toggleSection(idx)" 
                  class="w-full px-5 py-4 flex items-center justify-between bg-white hover:bg-slate-50 transition-colors">
            
            <div class="flex items-center gap-3">
              <div class="bg-accent/20 text-primary p-2 rounded-xl shrink-0">
                <svg class="w-5 h-5" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="section.icon"></path>
                </svg>
              </div>
              <h3 class="text-[15px] font-bold text-primary">{{ section.title }}</h3>
            </div>
            
            <!-- Chevron -->
            <div [class.rotate-180]="section.isOpen" class="text-slate-400 text-sm transition-transform duration-300 pointer-events-none">
              <svg class="w-5 h-5" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
          </button>

          <!-- Accordion Content -->
          <div [class.grid-rows-[1fr]]="section.isOpen" 
               [class.grid-rows-[0fr]]="!section.isOpen" 
               class="grid transition-[grid-template-rows] duration-300 ease-in-out">
            <div class="overflow-hidden">
              <div class="p-5 pt-1 border-t border-slate-50/50" [innerHTML]="section.contentHtml">
                <!-- Content injected via innerHTML from TS -->
              </div>
            </div>
          </div>
          
        </div>
      }

    </div>
  </div>
</div>
