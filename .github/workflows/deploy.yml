name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_APP_SCRIPT_URL }}" ]; then
            echo "❌ Secret GOOGLE_APP_SCRIPT_URL 未設定！"
            echo "請至 GitHub Repo → Settings → Secrets and variables → Actions 新增此 Secret"
            exit 1
          fi
          if [ -z "${{ secrets.OPEN_WEATHER_API_KEY }}" ]; then
            echo "❌ Secret OPEN_WEATHER_API_KEY 未設定！"
            exit 1
          fi
          echo "✅ Secrets 驗證通過"

      - name: Write environment file from secrets
        run: |
          cat > src/environments/environment.ts << EOF
          export const environment = {
            production: true,
            googleAppScriptUrl: '${{ secrets.GOOGLE_APP_SCRIPT_URL }}',
            openWeatherApiKey: '${{ secrets.OPEN_WEATHER_API_KEY }}',
          };
          EOF

      - name: Build
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          npx ng build --configuration production \
            --base-href "/${REPO_NAME}/" \
            --output-path dist/out
          # SPA fallback：直接重新整理任何路由都不會 404
          cp dist/out/browser/index.html dist/out/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/out/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
